<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Cobrinha</title>
<style>
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: white;
    font-family: Arial, sans-serif;
    flex-direction: column;
  }
  canvas {
    background: #222;
    border: 2px solid #0f0;
    display: none;
  }
  .menu {
    text-align: center;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 15px;
    cursor: pointer;
    background: #0f0;
    border: none;
    color: #111;
    border-radius: 5px;
  }
  .controls {
    display: none;
    margin-top: 15px;
  }
  .controls button {
    width: 60px;
    height: 60px;
    font-size: 24px;
    margin: 5px;
    background: #0f0;
    color: #111;
    border: none;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="menu" class="menu">
  <h1>🐍 Jogo da Cobrinha</h1>
  <button onclick="startGame()">Iniciar Jogo</button>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls" class="controls">
  <div>
    <button onclick="setDirection('up')">⬆️</button>
  </div>
  <div>
    <button onclick="setDirection('left')">⬅️</button>
    <button onclick="setDirection('down')">⬇️</button>
    <button onclick="setDirection('right')">➡️</button>
  </div>
</div>

<div id="gameOver" class="menu" style="display:none;">
  <h2>💀 Game Over!</h2>
  <p id="finalScore"></p>
  <button onclick="startGame()">Jogar Novamente</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const box = 20;
let snake, direction, food, score, gameLoop, speed;

document.addEventListener("keydown", event => {
  if ((event.key === "ArrowLeft" || event.key === "a") && direction !== "right") direction = "left";
  if ((event.key === "ArrowUp" || event.key === "w") && direction !== "down") direction = "up";
  if ((event.key === "ArrowRight" || event.key === "d") && direction !== "left") direction = "right";
  if ((event.key === "ArrowDown" || event.key === "s") && direction !== "up") direction = "down";
});

function setDirection(dir) {
  if (dir === "left" && direction !== "right") direction = "left";
  if (dir === "up" && direction !== "down") direction = "up";
  if (dir === "right" && direction !== "left") direction = "right";
  if (dir === "down" && direction !== "up") direction = "down";
}

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameOver").style.display = "none";
  canvas.style.display = "block";

  // Mostrar controles se for mobile
  if (/Mobi|Android/i.test(navigator.userAgent)) {
    document.getElementById("controls").style.display = "block";
  } else {
    document.getElementById("controls").style.display = "none";
  }

  snake = [{ x: 9 * box, y: 9 * box }];
  direction = "right";
  score = 0;
  speed = 100;

  food = {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
  };

  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(draw, speed);
}

function draw() {
  ctx.clearRect(0, 0, 400, 400);

  // Comida
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  // Cobra
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // Movimento
  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "left") headX -= box;
  if (direction === "up") headY -= box;
  if (direction === "right") headX += box;
  if (direction === "down") headY += box;

  // Comer comida
  if (headX === food.x && headY === food.y) {
    score++;
    food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };

    if (score % 5 === 0 && speed > 50) {
      clearInterval(gameLoop);
      speed -= 10;
      gameLoop = setInterval(draw, speed);
    }
  } else {
    snake.pop();
  }

  const newHead = { x: headX, y: headY };

  // Colisão
  if (
    headX < 0 || headX >= 400 || headY < 0 || headY >= 400 ||
    snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)
  ) {
    clearInterval(gameLoop);
    canvas.style.display = "none";
    document.getElementById("controls").style.display = "none";
    document.getElementById("gameOver").style.display = "block";
    document.getElementById("finalScore").innerText = "Pontuação final: " + score;
    return;
  }

  snake.unshift(newHead);

  // Mostrar pontuação
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Pontuação: " + score, 10, 20);
}
</script>
</body>
</html>
