<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>🐍 Jogo da Cobrinha</title>
<style>
  body { background:#111; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; color:white; font-family:Arial; flex-direction:column; }
  canvas { background:#222; border:2px solid #0f0; display:none; }
  .menu { text-align:center; }
  button { padding:10px 20px; font-size:18px; margin:10px; cursor:pointer; background:#0f0; border:none; color:#111; border-radius:5px; }
  #controls button { font-size:24px; margin:5px; }
</style>
</head>
<body>

<div id="menu" class="menu">
  <h1>🐍 Jogo da Cobrinha</h1>
  <button onclick="startGame()">Iniciar Jogo</button>
  <button onclick="sendFeedback()">Enviar Feedback</button>
  <p>Use W A S D ou ⬆️ ⬅️ ⬇️ ➡️</p>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls" style="display:none; text-align:center; margin-top:10px;">
  <button onclick="setDirection('up')">⬆️</button><br>
  <button onclick="setDirection('left')">⬅️</button>
  <button onclick="setDirection('down')">⬇️</button>
  <button onclick="setDirection('right')">➡️</button>
</div>

<div id="gameOver" class="menu" style="display:none;">
  <h2>💀 Game Over!</h2>
  <p id="finalScore"></p>
  <button onclick="startGame()">Jogar Novamente</button>
</div>

<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
let box=20,snake,direction,food,specialFood,score,gameLoop;

function sendFeedback(){
  window.location.href="mailto:davifmarschall15@gmail.com?subject=Feedback%20Snake%20Game";
}

function isMobile(){
  return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("gameOver").style.display="none";
  canvas.style.display="block";
  if(isMobile()) document.getElementById("controls").style.display="block";
  else document.getElementById("controls").style.display="none";
  snake=[{x:9*box,y:9*box}];
  direction="right";
  score=0;
  food=randomFood();
  specialFood=null;
  if(gameLoop)clearInterval(gameLoop);
  gameLoop=setInterval(draw,100);
}

function randomFood(){
  return {
    x:Math.floor(Math.random()*(canvas.width/box))*box,
    y:Math.floor(Math.random()*(canvas.height/box))*box
  };
}

function setDirection(dir){
  if(dir==="left"&&direction!=="right")direction="left";
  if(dir==="up"&&direction!=="down")direction="up";
  if(dir==="right"&&direction!=="left")direction="right";
  if(dir==="down"&&direction!=="up")direction="down";
}

document.addEventListener("keydown",e=>{
  if((e.key==="ArrowLeft"||e.key==="a")&&direction!=="right")direction="left";
  if((e.key==="ArrowUp"||e.key==="w")&&direction!=="down")direction="up";
  if((e.key==="ArrowRight"||e.key==="d")&&direction!=="left")direction="right";
  if((e.key==="ArrowDown"||e.key==="s")&&direction!=="up")direction="down";
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // comida normal
  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,box,box);

  // comida especial
  if(specialFood){
    ctx.fillStyle="gold";
    ctx.fillRect(specialFood.x,specialFood.y,box,box);
  }

  // cobra
  for(let i=0;i<snake.length;i++){
    ctx.fillStyle=i===0?"lime":"green";
    ctx.fillRect(snake[i].x,snake[i].y,box,box);
  }

  let headX=snake[0].x,headY=snake[0].y;
  if(direction==="left")headX-=box;
  if(direction==="up")headY-=box;
  if(direction==="right")headX+=box;
  if(direction==="down")headY+=box;

  // comer comida normal
  if(headX===food.x&&headY===food.y){
    score++;
    food=randomFood();
    // chance de aparecer comida especial
    if(Math.random()<0.3){
      specialFood=randomFood();
    }
  }
  // comer comida especial
  else if(specialFood && headX===specialFood.x && headY===specialFood.y){
    score+=3;
    specialFood=null;
  }
  else{
    snake.pop();
  }

  const newHead={x:headX,y:headY};

  // colisão
  if(headX<0||headX>=canvas.width||headY<0||headY>=canvas.height||snake.some(s=>s.x===newHead.x&&s.y===newHead.y)){
    clearInterval(gameLoop);
    canvas.style.display="none";
    document.getElementById("gameOver").style.display="block";
    document.getElementById("finalScore").innerText="Pontuação: "+score;
    return;
  }

  snake.unshift(newHead);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("Pontuação: "+score,10,20);
}
</script>
</body>
</html>
