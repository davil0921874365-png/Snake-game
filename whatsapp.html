<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WhatsApp Teste</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background:#111; color:white; height:100vh; overflow:hidden; }

  #loginScreen {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(135deg, #00a884, #075e54);
    display:flex; align-items:center; justify-content:center; z-index:100;
  }
  .loginBox {
    background:white; color:#111; padding:40px 35px; border-radius:12px;
    text-align:center; width:340px; box-shadow:0 15px 35px rgba(0,0,0,0.6);
  }
  .loginBox h1 { color:#00a884; margin-bottom:10px; }
  input { 
    width:100%; padding:14px; margin:15px 0; font-size:18px; 
    text-align:center; border:2px solid #00a884; border-radius:8px;
  }
  button { 
    width:100%; padding:14px; background:#00a884; color:white; 
    border:none; border-radius:8px; font-size:18px; cursor:pointer; margin-top:10px;
  }
  button:hover { background:#008c6e; }

  #app { display:none; height:100vh; flex-direction:row; }

  /* Lista de contatos */
  .sidebar {
    width: 380px; background:#1f1f1f; border-right:1px solid #333;
    overflow-y:auto;
  }
  .header {
    background:#00a884; padding:15px 20px; color:white; font-size:20px; font-weight:bold;
  }
  .contact {
    padding:15px 20px; display:flex; align-items:center; gap:15px;
    cursor:pointer; border-bottom:1px solid #333;
  }
  .contact:hover { background:#2a2a2a; }
  .contact img { width:55px; height:55px; border-radius:50%; background:#555; }

  /* Área do chat */
  .chat-container {
    flex:1; display:flex; flex-direction:column; background:#0f0f0f;
  }
  .chat-header {
    background:#00a884; padding:12px 20px; display:flex; align-items:center; gap:15px; color:white;
  }
  .chat-header img { width:45px; height:45px; border-radius:50%; }

  .chat-area {
    flex:1; padding:20px; overflow-y:auto; background:url('https://i.imgur.com/5Zf4Z3k.png') repeat;
    background-size: cover;
  }
  .message {
    max-width:75%; margin:10px 0; padding:12px 16px; border-radius:18px;
    line-height:1.4; position:relative;
  }
  .sent {
    background:#00a884; color:white; align-self:flex-end; border-bottom-right-radius:4px;
    margin-left:auto;
  }
  .received {
    background:#333; color:white; align-self:flex-start; border-bottom-left-radius:4px;
  }

  .input-area {
    background:#1f1f1f; padding:10px 15px; display:flex; gap:10px; align-items:center;
  }
  .input-area input {
    flex:1; padding:14px 20px; border-radius:30px; border:none; font-size:17px; background:#333; color:white;
  }
  .input-area button {
    background:#00a884; color:white; border:none; width:50px; height:50px; border-radius:50%; font-size:24px; cursor:pointer;
  }
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen">
  <div class="loginBox">
    <h1>WhatsApp</h1>
    <p style="margin:15px 0 25px; color:#555;">Digite sua senha</p>
    <input type="password" id="passwordInput" placeholder="Senha" maxlength="4" onkeypress="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Entrar</button>
    <p style="margin-top:25px; font-size:14px; color:#666;">
      Fragoso → <strong>4268</strong><br>
      Wuboski Rara → <strong>3876</strong>
    </p>
  </div>
</div>

<!-- APLICATIVO -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="header">WhatsApp</div>
    <div id="contactList"></div>
  </div>

  <!-- Chat -->
  <div class="chat-container">
    <div class="chat-header" id="chatHeader">
      <img src="https://i.imgur.com/8Km9t.png" alt="foto">
      <div>
        <strong id="chatName"></strong><br>
        <small>online</small>
      </div>
    </div>
    
    <div class="chat-area" id="chatArea"></div>
    
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Digite uma mensagem..." 
             onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// Dados dos usuários
const users = {
  "4268": { id: "fragoso", name: "Fragoso", color: "#00a884" },
  "3876": { id: "wuboski", name: "Wuboski Rara", color: "#ff9800" }
};

let currentUser = null;
let currentChat = null;
let conversations = {};   // armazena as mensagens entre os dois

function checkPassword() {
  const pass = document.getElementById("passwordInput").value.trim();
  
  if (users[pass]) {
    currentUser = users[pass];
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    loadContacts();
  } else {
    alert("Senha incorreta! Tente novamente.");
  }
}

function loadContacts() {
  const otherName = currentUser.name === "Fragoso" ? "Wuboski Rara" : "Fragoso";
  const list = document.getElementById("contactList");
  
  list.innerHTML = `
    <div class="contact" onclick="openChat('${otherName}')">
      <img src="https://i.imgur.com/8Km9t.png" alt="foto">
      <div>
        <strong>${otherName}</strong><br>
        <small>Última mensagem...</small>
      </div>
    </div>
  `;

  // Abre automaticamente o chat com a outra pessoa
  openChat(otherName);
}

function openChat(otherName) {
  currentChat = otherName;
  document.getElementById("chatName").textContent = otherName;
  
  const area = document.getElementById("chatArea");
  area.innerHTML = "";

  const key = currentUser.name + "_" + otherName;
  if (!conversations[key]) conversations[key] = [];

  conversations[key].forEach(msg => {
    const div = document.createElement("div");
    div.className = `message ${msg.from === currentUser.name ? "sent" : "received"}`;
    div.innerHTML = msg.text;
    area.appendChild(div);
  });

  area.scrollTop = area.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  
  if (!text || !currentChat) return;

  const key = currentUser.name + "_" + currentChat;
  
  if (!conversations[key]) conversations[key] = [];

  // Adiciona a mensagem enviada
  conversations[key].push({
    from: currentUser.name,
    text: text
  });

  openChat(currentChat);   // atualiza a tela
  input.value = "";
}

// Fecha o teclado no mobile ao enviar
document.getElementById("messageInput").addEventListener("focus", function() {
  this.scrollIntoView();
});
</script>
</body>
</html>
